<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>US CHAROLLES FOOT</title></head><body><p style="font-family:Arial;padding:20px">Chargement de US CHAROLLES FOOT…</p><script>(async()=>{let x='';for(let i=1;i<=5;i++)x+=await(await fetch('parts/part'+i+'.txt')).text();const b=atob(x),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);const s=new DecompressionStream('gzip');let t=await new Response(new Blob([a]).stream().pipeThrough(s)).text();t=t.replace('<title>Annuaire des pôles et contacts — US Charolles V7</title>','<title>US CHAROLLES FOOT</title>').replace('Gestion de la saison féminine — Version 6','US CHAROLLES FOOT').replace('US Charolles • ANNUAIRE DES PÔLES • ajout d’un contact dans chaque pôle','Gestion de la saison féminine • Annuaire des pôles • Joueuses et licences • Documents');document.open();document.write(t);document.close();})().catch(e=>{document.body.innerHTML='<h2>Impossible de charger le logiciel</h2><p>Utilisez Google Chrome ou Microsoft Edge.</p>';console.error(e)});</script></body></html>
